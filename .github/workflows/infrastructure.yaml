name: Terraform EC2 (Plan on PR, Apply on main)

on:
  pull_request:
    branches: ["main"]
    paths: ["infra/**"]
  push:
    branches: ["main"]
    paths: ["infra/**"]

permissions:
  contents: read

jobs:
  plan:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      # Configure AWS creds only when secrets are available and PR is NOT from a fork
      - name: Configure AWS credentials (static keys)
        if: ${{ !github.event.pull_request.head.repo.fork && secrets.AWS_ACCESS_KEY_ID != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Optional sanity check (only runs if creds configured)
      - name: Who am I?
        if: ${{ !github.event.pull_request.head.repo.fork && secrets.AWS_ACCESS_KEY_ID != '' }}
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      # Init for fork PRs or when secrets are missing: no backend/remote calls
      - name: Terraform Init (no backend for forks/no creds)
        if: ${{ github.event.pull_request.head.repo.fork || secrets.AWS_ACCESS_KEY_ID == '' }}
        run: terraform init -backend=false

      # Normal init when creds are available
      - name: Terraform Init
        if: ${{ !github.event.pull_request.head.repo.fork && secrets.AWS_ACCESS_KEY_ID != '' }}
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      # Full plan only when creds are available (internal PRs)
      - name: Terraform Plan
        if: ${{ !github.event.pull_request.head.repo.fork && secrets.AWS_ACCESS_KEY_ID != '' }}
        run: terraform plan -no-color

  apply:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main') }}
    runs-on: ubuntu-latest
    environment: prod   # optional: add Environment approval in GitHub UI
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Who am I?
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (for apply)
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan