name: Terraform EC2 (Plan on PR, Apply on main)

on:
  pull_request:
    branches: ["main"]
    paths: ["infra/**"]
  push:
    branches: ["main"]
    paths: ["infra/**"]

permissions:
  contents: read

jobs:
  plan:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      # For PRs from forks: no creds, no remote calls
      - name: Terraform Init (fork PR: no backend)
        if: ${{ github.event.pull_request.head.repo.fork }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5
      - name: Init (backend=false)
        if: ${{ github.event.pull_request.head.repo.fork }}
        run: terraform init -backend=false
      - name: Validate (fork-safe)
        if: ${{ github.event.pull_request.head.repo.fork }}
        run: terraform validate

      # For PRs from same repo: configure creds and do a real plan
      - name: Configure AWS credentials (static keys)
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Who am I?
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: aws sts get-caller-identity

      - name: Setup Terraform
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: terraform init

      - name: Terraform Validate
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: terraform validate

      - name: Terraform Plan
        if: ${{ !github.event.pull_request.head.repo.fork }}
        run: terraform plan -no-color

  apply:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main') }}
    runs-on: ubuntu-latest
    environment: prod   # optional: add environment approvals in GitHub UI
    defaults:
      run:
        working-directory: infra

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Who am I?
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (for apply)
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan