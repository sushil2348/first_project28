name: Terraform EC2 (Plan on PR, Apply on main)

on:
  pull_request:
    branches: ["main"]
    paths: ["infra/**"]
  push:
    branches: ["main"]
    paths: ["infra/**"]

permissions:
  contents: read

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      # ✅ Only configure AWS credentials when secrets are available and PR is NOT from a fork
      - name: Configure AWS credentials (static keys)
        if: secrets.AWS_ACCESS_KEY_ID != '' && github.event.pull_request.head.repo.fork == false
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # Optional sanity check (runs only if creds configured)
      - name: Who am I?
        if: secrets.AWS_ACCESS_KEY_ID != '' && github.event.pull_request.head.repo.fork == false
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        # For forked PRs (no creds), initialize without backend or remote calls just to validate syntax
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ] || [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "Fork PR or no secrets: init without backend to allow validate."
            terraform init -backend=false
          else
            terraform init
          fi

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        # Run full plan only when credentials were configured
        if: secrets.AWS_ACCESS_KEY_ID != '' && github.event.pull_request.head.repo.fork == false
        run: terraform plan -no-color

  apply:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: prod   # optional: require approvals in Environments
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (static keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Who am I?
        run: aws sts get-caller-identity

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan (for apply)
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan